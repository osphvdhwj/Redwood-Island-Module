name: Android Build

on:
  push:
    branches: [ "refs/heads/feat/palette-ux-improvements-6667854715765388137-11764922435106616749", "main", "dynamic-island-visuals-v5-build" ]
  pull_request:
    branches: [ "refs/heads/feat/palette-ux-improvements-6667854715765388137-11764922435106616749", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: "17"
        distribution: "temurin"
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        overwrite: true
