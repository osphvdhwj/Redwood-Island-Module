name: Android Build

on:
  push:
    branches: [ "feat/pelette-ux-improvements-6667854715765388137-11764922435106616749", "main", "dynamic-island-visuals-v5-build" ]
  pull_request:
    branches: [ "feat/palette-ux-improvements-6667854715765388137-11764922435106616749", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: "17"
        distribution: "temurin"
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build unsigned Release APK
      run: ./gradlew assembleRelease

    - name: Setup build tools
      run: |
        echo "BUILD_TOOLS_VERSION=$(ls $ANDROID_SDK_ROOT/build-tools | sort -rV | head -n1)" >> $GITHUB_ENV

    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE }}" | base64 --decode > keystore.jks

    - name: Sign APK
      run: |
        $ANDROID_SDK_ROOT/build-tools/${{ env.BUILD_TOOLS_VERSION }}/apksigner sign \
          --ks keystore.jks \
          --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
          --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
          --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
          --out app/build/outputs/apk/release/app-release-signed.apk \
          app/build/outputs/apk/release/app-release-unsigned.apk

    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: app/build/outputs/apk/release/app-release-signed.apk
        overwrite: true
