name: Android Build

on:
  push:
    branches: [ "master", "main", "dynamic-island-13903703730149818045" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4 # Updated from v3

    - name: set up JDK 17
      uses: actions/setup-java@v4 # Updated from v3
      with:
        java-version: "17"
        distribution: "temurin"
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4 # Fixes the Deprecation Error
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        overwrite: true
