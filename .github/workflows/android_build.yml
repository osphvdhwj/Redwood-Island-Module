name: Android Build

on:
  push:
    branches: [ "", "dynamic-island-visuals-v5-build" ]
  pull_request:
    branches: [ "1_s", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: "17"
        distribution: "temurin"

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      # This is the modern, officially recommended way to cache Gradle builds,
      # significantly speeding up your CI runs compared to the standard Java cache.

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 🚀 NEW STEP: Run Android Lint & Syntax Checks
    # This acts as the gatekeeper. If there are code errors, it stops here.
    - name: Run Code Checks
      run: ./gradlew check --stacktrace

    - name: Build unsigned Release APK
      # This step will ONLY run if the Code Checks pass perfectly.
      run: ./gradlew assembleRelease

    - name: Get Build Tools Version
      run: |
        echo "BUILD_TOOLS_VERSION=$(ls $ANDROID_SDK_ROOT/build-tools | sort -rV | head -n1)" >> $GITHUB_ENV

    - name: Zipalign & Sign APK
      env:
        KEYSTORE_B64: ${{ secrets.KEYSTORE }}
        ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_STORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_PASS: ${{ secrets.KEY_PASSWORD }}
      run: |
        # 1. Decode keystore securely
        echo "$KEYSTORE_B64" | base64 --decode > keystore.jks
        
        # Paths
        BUILD_TOOLS="$ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS_VERSION"
        UNSIGNED_APK="app/build/outputs/apk/release/app-release-unsigned.apk"
        ALIGNED_APK="app/build/outputs/apk/release/app-release-aligned.apk"
        SIGNED_APK="app/build/outputs/apk/release/DynamicIsland-Release.apk"
        
        # 2. Zipalign (Mandatory before apksigner)
        $BUILD_TOOLS/zipalign -v -p 4 "$UNSIGNED_APK" "$ALIGNED_APK"
        
        # 3. Sign the aligned APK
        $BUILD_TOOLS/apksigner sign \
          --ks keystore.jks \
          --ks-key-alias "$ALIAS" \
          --ks-pass "pass:$KEY_STORE_PASS" \
          --key-pass "pass:$KEY_PASS" \
          --out "$SIGNED_APK" \
          "$ALIGNED_APK"
          
        # 4. Clean up sensitive keystore file
        rm keystore.jks

    - name: Upload Signed APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DynamicIsland-Release
        path: app/build/outputs/apk/release/DynamicIsland-Release.apk
        overwrite: true
