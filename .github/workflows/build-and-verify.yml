name: Build & Verify (Multi-Module)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.11.1

    - name: Run Unit Tests (All Modules)
      run: gradle test --no-daemon --no-configuration-cache

    - name: Build Debug APKs
      run: gradle assembleDebug --no-daemon --no-configuration-cache

    - name: Upload Satellite APK (Xposed Module)
      uses: actions/upload-artifact@v4
      with:
        name: redwood-satellite-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Core Daemon APK (The Brain)
      uses: actions/upload-artifact@v4
      with:
        name: redwood-core-debug
        path: core/build/outputs/apk/debug/core-debug.apk
